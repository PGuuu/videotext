<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>家人通話</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: rgba(255,255,255,0.09);
      --accent: #2ea043; --blue: #388bfd; --text: #e6edf3; --muted: rgba(230,237,243,0.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* LOBBY */
    #lobby {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,160,67,0.1) 0%, transparent 65%), var(--bg);
    }
    .logo { text-align: center; }
    .logo-icon {
      width: 70px; height: 70px; border-radius: 20px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #2ea043, #388bfd);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
      box-shadow: 0 8px 28px rgba(46,160,67,0.28);
    }
    .logo h1 { font-size: 26px; font-weight: 900; }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card {
      width: 100%; max-width: 370px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .join-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2ea043, #26a641); color: #fff;
      font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 18px rgba(46,160,67,0.32);
    }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
    #status.err { color: #f85149; }

    /* CALL SCREEN */
    #callScreen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
    #videoWrap {
      flex: 1; position: relative; background: #000; min-height: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
    #localVideo {
      position: absolute; bottom: 70px; right: 12px; width: 90px; height: 120px;
      border-radius: 10px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); background: #111;
    }
    #waitOverlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; color: var(--muted);
      background: rgba(0,0,0,0.6);
    }
    #waitOverlay .wi { font-size: 52px; }
    #waitOverlay p { font-size: 14px; text-align: center; line-height: 1.7; padding: 0 24px; }

    /* Controls bar */
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 16px 12px;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      z-index: 10;
    }
    .ctrl-btn {
      width: 50px; height: 50px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; transition: all 0.18s;
      background: rgba(255,255,255,0.15);
    }
    .ctrl-btn.off { background: rgba(248,81,73,0.75); }
    .ctrl-btn.end { background: rgba(248,81,73,0.9); width: 56px; height: 56px; font-size: 24px; }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-label { font-size: 10px; color: rgba(255,255,255,0.55); text-align: center; margin-top: 3px; }
    .ctrl-wrap { display: flex; flex-direction: column; align-items: center; }

    /* CAPTION AREA */
    #captionArea { background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
    #captionDisplay {
      flex: 1; padding: 18px 18px 10px; display: flex; flex-direction: column;
      justify-content: flex-end; gap: 6px; overflow: hidden; min-height: 160px;
    }
    .caption-line { line-height: 1.35; transition: all 0.2s; }
    .caption-line.old { color: var(--muted); }
    .caption-line.cur { color: #fff; font-weight: 700; }
    .ph { color: rgba(255,255,255,0.16); font-size: 17px; text-align: center; margin: auto; line-height: 1.9; }
    #fontControl { padding: 8px 16px 14px; display: flex; align-items: center; gap: 10px; }
    #fontControl span { font-size: 12px; color: var(--muted); }
    #fontControl input[type=range] { flex: 1; accent-color: var(--blue); }
    #fontLabel { font-size: 12px; color: var(--blue); min-width: 36px; text-align: right; }
    #typerArea { padding: 12px 14px 18px; display: flex; flex-direction: column; gap: 10px; }
    #typerArea textarea {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px; font-size: 17px; color: var(--text);
      font-family: inherit; resize: none; outline: none; min-height: 78px;
    }
    #typerArea textarea:focus { border-color: var(--blue); }
    .send-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #388bfd, #1f6feb); color: #fff;
      font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 14px rgba(56,139,253,0.28);
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MODALS */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center; z-index: 100; padding: 24px;
    }
    .modal-bg.show { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-card h2 { font-size: 18px; font-weight: 700; }
    .modal-card p { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .link-box {
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px;
      font-size: 13px; color: var(--blue); border: 1px solid var(--border);
      word-break: break-all; line-height: 1.5;
    }
    .btn-blue {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: rgba(56,139,253,0.15); color: var(--blue);
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-green {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }

    /* CONNECTING SCREEN */
    #connectingScreen {
      display: none; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; padding: 32px;
      background: var(--bg);
    }
    #connectingScreen .ci { font-size: 60px; animation: spin 2s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #connectingScreen h2 { font-size: 20px; font-weight: 700; }
    #connectingScreen p { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <h1>家人通話</h1>
    <p>視訊通話 + 大字幕，讓溝通更輕鬆</p>
  </div>
  <div class="card">
    <p style="font-size:14px;color:var(--muted);line-height:1.7;">
      按下「開始通話」，App 會產生一個連結。<br>
      把連結傳給外公，外公點開就自動加入。
    </p>
    <div id="status"></div>
    <button class="join-btn" id="joinBtn" onclick="startAsTyper()">開始通話</button>
  </div>
</div>

<!-- CONNECTING SCREEN -->
<div id="connectingScreen">
  <div class="ci">📡</div>
  <h2>連線中…</h2>
  <p>正在連接到對方，請稍候。</p>
  <div id="connectErr" style="font-size:13px;color:#f85149;text-align:center;"></div>
</div>

<!-- SHARE MODAL -->
<div class="modal-bg" id="shareModal">
  <div class="modal-card">
    <h2>📤 傳連結給外公</h2>
    <p>用 LINE 把這個連結傳給外公，外公點開就會自動加入，不需要輸入任何東西。</p>
    <div class="link-box" id="shareLink"></div>
    <button class="btn-blue" id="copyBtn" onclick="copyLink()">複製連結</button>
    <button class="btn-green" onclick="document.getElementById('shareModal').classList.remove('show')">好，等外公連線</button>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
  <div id="videoWrap">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="waitOverlay">
      <div class="wi">📡</div>
      <p id="waitText">等待外公連線…<br>把連結傳給外公後，<br>外公點開就會出現在這裡。</p>
    </div>

    <!-- Controls bar -->
    <div id="controls">
      <div class="ctrl-wrap">
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <div class="ctrl-label" id="micLabel">靜音</div>
      </div>
      <div class="ctrl-wrap">
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">📷</button>
        <div class="ctrl-label" id="camLabel">關鏡頭</div>
      </div>
      <div class="ctrl-wrap">
        <button class="ctrl-btn end" onclick="endCall()">📵</button>
        <div class="ctrl-label">結束</div>
      </div>
    </div>
  </div>

  <div id="captionArea">
    <div id="captionDisplay" style="display:none;">
      <div class="ph" id="ph">等待對方傳訊息…</div>
    </div>
    <div id="fontControl" style="display:none;">
      <span>A</span>
      <input type="range" min="26" max="90" value="54" id="fontSlider" oninput="updateFont(this.value)">
      <span style="font-size:20px">A</span>
      <span id="fontLabel">54px</span>
    </div>
    <div id="typerArea" style="display:none;">
      <textarea id="msgInput" placeholder="輸入要說的話…外公會看到大字" rows="3"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>傳送 ➤</button>
    </div>
  </div>
</div>

<script>
  let peer, conn = null, call = null, localStream = null;
  let captions = [], fontSize = 54, myPeerId = '';
  let micOn = true, camOn = true;
  const params = new URLSearchParams(window.location.search);
  const joinId = params.get('join');

  window.addEventListener('load', () => {
    if (joinId) startAsViewer(joinId);
  });

  function randId() {
    return 'fam-' + Math.random().toString(36).slice(2, 10);
  }

  function makeShareLink(id) {
    return window.location.origin + window.location.pathname + '?join=' + id;
  }

  function peerConfig() {
    return {
      host: '0.peerjs.com', port: 443, path: '/', secure: true,
      config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    };
  }

  // ── MIC / CAM TOGGLES ──
  function toggleMic() {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    const btn = document.getElementById('micBtn');
    const lbl = document.getElementById('micLabel');
    btn.textContent = micOn ? '🎤' : '🔇';
    btn.classList.toggle('off', !micOn);
    lbl.textContent = micOn ? '靜音' : '取消靜音';
  }

  function toggleCam() {
    if (!localStream) return;
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    const btn = document.getElementById('camBtn');
    const lbl = document.getElementById('camLabel');
    btn.textContent = camOn ? '📷' : '🚫';
    btn.classList.toggle('off', !camOn);
    lbl.textContent = camOn ? '關鏡頭' : '開鏡頭';
    document.getElementById('localVideo').style.opacity = camOn ? '1' : '0.3';
  }

  // ── TYPER ──
  async function startAsTyper() {
    document.getElementById('joinBtn').disabled = true;
    document.getElementById('status').textContent = '取得相機中…';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch(e) {
      document.getElementById('status').textContent = '無法取得相機，請確認權限';
      document.getElementById('status').className = 'err';
      document.getElementById('joinBtn').disabled = false;
      return;
    }
    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('status').textContent = '錯誤：' + e.type; });
    peer.on('open', () => {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      document.getElementById('typerArea').style.display = 'flex';
      const link = makeShareLink(myPeerId);
      document.getElementById('shareLink').textContent = link;
      document.getElementById('shareModal').classList.add('show');
      peer.on('connection', c => {
        conn = c;
        conn.on('open', () => { document.getElementById('sendBtn').disabled = false; });
      });
      peer.on('call', incoming => {
        call = incoming;
        call.answer(localStream);
        call.on('stream', s => {
          document.getElementById('remoteVideo').srcObject = s;
          document.getElementById('waitOverlay').style.display = 'none';
        });
      });
    });
  }

  // ── VIEWER ──
  async function startAsViewer(targetId) {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('connectingScreen').style.display = 'flex';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch(e) {
      document.getElementById('connectErr').textContent = '無法取得相機，請確認權限';
      return;
    }
    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('connectErr').textContent = '連線錯誤：' + e.type; });
    peer.on('open', () => {
      conn = peer.connect(targetId);
      conn.on('open', () => {
        conn.on('data', onData);
        showViewerCallScreen();
      });
      conn.on('error', () => {
        document.getElementById('connectErr').textContent = '連線失敗，請確認對方已開啟通話';
      });
      call = peer.call(targetId, localStream);
      call.on('stream', s => {
        document.getElementById('remoteVideo').srcObject = s;
        document.getElementById('waitOverlay').style.display = 'none';
      });
      call.on('error', () => {
        document.getElementById('connectErr').textContent = '視訊連線失敗';
      });
    });
  }

  function showViewerCallScreen() {
    document.getElementById('connectingScreen').style.display = 'none';
    document.getElementById('callScreen').style.display = 'flex';
    document.getElementById('captionDisplay').style.display = 'flex';
    document.getElementById('fontControl').style.display = 'flex';
    document.getElementById('waitOverlay').querySelector('p').textContent = '等待視訊連線…';
  }

  // ── CAPTIONS ──
  function onData(text) {
    document.getElementById('ph').style.display = 'none';
    captions.push(text);
    if (captions.length > 3) captions = captions.slice(-3);
    renderCaptions();
  }

  function renderCaptions() {
    const display = document.getElementById('captionDisplay');
    display.querySelectorAll('.caption-line').forEach(el => el.remove());
    captions.forEach((line, i) => {
      const isCur = i === captions.length - 1;
      const div = document.createElement('div');
      div.className = 'caption-line ' + (isCur ? 'cur' : 'old');
      div.style.fontSize = (isCur ? fontSize : Math.max(fontSize - 16, 18)) + 'px';
      div.textContent = line;
      display.appendChild(div);
    });
  }

  function sendMsg() {
    const input = documen
