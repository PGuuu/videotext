<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>家人通話</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: rgba(255,255,255,0.09);
      --accent: #2ea043; --blue: #388bfd; --text: #e6edf3; --muted: rgba(230,237,243,0.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* ── LOBBY ── */
    #lobby {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,160,67,0.1) 0%, transparent 65%), var(--bg);
    }
    .logo { text-align: center; }
    .logo-icon {
      width: 70px; height: 70px; border-radius: 20px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #2ea043, #388bfd);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
      box-shadow: 0 8px 28px rgba(46,160,67,0.28);
    }
    .logo h1 { font-size: 26px; font-weight: 900; }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card {
      width: 100%; max-width: 370px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .join-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2ea043, #26a641); color: #fff;
      font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 18px rgba(46,160,67,0.32);
    }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
    #status.err { color: #f85149; }

    /* ── CONNECTING ── */
    #connectingScreen {
      display: none; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; padding: 32px; background: var(--bg);
    }
    #connectingScreen .ci { font-size: 60px; animation: spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #connectingScreen h2 { font-size: 20px; font-weight: 700; }
    #connectingScreen p { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }

    /* ── CALL SCREEN ── */
    #callScreen {
      display: none;
      height: 100vh; height: 100dvh;
      flex-direction: column;
    }

    /* Top: video + caption strip */
    #callTop {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    /* LEFT: vertical caption strip ~1/3 */
    #captionStrip {
      width: 33%;
      background: #0a0a0f;
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #captionScroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 0;
      scroll-behavior: smooth;
      /* hide scrollbar visually */
      scrollbar-width: none;
    }
    #captionScroll::-webkit-scrollbar { display: none; }

    #captionText {
      /* Vertical Chinese: each char on its own line */
      writing-mode: horizontal-tb; /* we'll use one-char-per-line via JS */
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .char-block {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      color: #fff;
      width: 100%;
    }
    .char-block.space { height: 14px; } /* blank line between messages */
    .char-block.highlight { color: #60a5fa; } /* current scroll position marker */

    /* Scroll indicator */
    #scrollIndicator {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(to top, rgba(10,10,15,0.95), transparent);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 6px;
      pointer-events: none;
    }
    #scrollIndicator span { font-size: 11px; color: var(--muted); }

    /* Caption placeholder */
    #captionPlaceholder {
      color: rgba(255,255,255,0.15);
      font-size: 12px;
      text-align: center;
      padding: 20px 8px;
      line-height: 2;
    }

    /* RIGHT: video */
    #videoWrap {
      flex: 1;
      position: relative;
      background: #000;
    }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
    #localVideo {
      position: absolute; bottom: 60px; right: 8px;
      width: 72px; height: 96px; border-radius: 8px;
      object-fit: cover; border: 2px solid rgba(255,255,255,0.2); background: #111;
    }
    #waitOverlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
      background: rgba(0,0,0,0.6);
    }
    #waitOverlay .wi { font-size: 40px; }
    #waitOverlay p { font-size: 12px; text-align: center; line-height: 1.7; padding: 0 12px; }

    /* Video controls */
    #vidControls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 10px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; background: rgba(255,255,255,0.15);
      transition: all 0.15s;
    }
    .ctrl-btn.off { background: rgba(248,81,73,0.75); }
    .ctrl-btn.end { background: rgba(248,81,73,0.9); width: 48px; height: 48px; }
    .ctrl-btn:active { transform: scale(0.9); }

    /* ── BOTTOM: input area (typer only) ── */
    #inputArea {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 12px 14px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #inputRow {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #msgInput {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 100px;
    }
    #msgInput:focus { border-color: var(--blue); }

    .send-btn {
      padding: 10px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #388bfd, #1f6feb); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
      white-space: nowrap; height: 44px;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Scroll controls (typer only) */
    #scrollControls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #scrollControls span { font-size: 11px; color: var(--muted); flex: 1; }
    .scroll-btn {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.06); color: var(--text);
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: all 0.15s;
    }
    .scroll-btn:active { background: rgba(255,255,255,0.12); }

    /* Font size control (viewer) */
    #fontControl {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 14px 14px; display: none; align-items: center; gap: 10px;
    }
    #fontControl span { font-size: 12px; color: var(--muted); }
    #fontControl input[type=range] { flex: 1; accent-color: var(--blue); }
    #fontLabel { font-size: 12px; color: var(--blue); min-width: 36px; text-align: right; }

    /* MODALS */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center; z-index: 100; padding: 24px;
    }
    .modal-bg.show { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-card h2 { font-size: 18px; font-weight: 700; }
    .modal-card p { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .link-box {
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: var(--blue); border: 1px solid var(--border);
      word-break: break-all; line-height: 1.5;
    }
    .btn-blue {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: rgba(56,139,253,0.15); color: var(--blue);
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-green {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <h1>家人通話</h1>
    <p>視訊通話 + 大字幕，讓溝通更輕鬆</p>
  </div>
  <div class="card">
    <p style="font-size:14px;color:var(--muted);line-height:1.7;">
      按下「開始通話」，App 會產生一個連結。<br>
      把連結傳給外公，外公點開就自動加入。
    </p>
    <div id="status"></div>
    <button class="join-btn" id="joinBtn" onclick="startAsTyper()">開始通話</button>
  </div>
</div>

<!-- CONNECTING -->
<div id="connectingScreen">
  <div class="ci">📡</div>
  <h2>連線中…</h2>
  <p>正在連接到對方，請稍候。</p>
  <div id="connectErr" style="font-size:13px;color:#f85149;text-align:center;margin-top:8px;"></div>
</div>

<!-- SHARE MODAL -->
<div class="modal-bg" id="shareModal">
  <div class="modal-card">
    <h2>📤 傳連結給外公</h2>
    <p>用 LINE 把這個連結傳給外公，外公點開就會自動加入。</p>
    <div class="link-box" id="shareLink"></div>
    <button class="btn-blue" id="copyBtn" onclick="copyLink()">複製連結</button>
    <button class="btn-green" onclick="document.getElementById('shareModal').classList.remove('show')">好，等外公連線</button>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
  <div id="callTop">

    <!-- LEFT: vertical caption strip -->
    <div id="captionStrip">
      <div id="captionScroll">
        <div id="captionText">
          <div id="captionPlaceholder">等待<br>訊息<br>⋯</div>
        </div>
      </div>
      <div id="scrollIndicator"><span id="scrollHint"></span></div>
    </div>

    <!-- RIGHT: video -->
    <div id="videoWrap">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay playsinline muted></video>
      <div id="waitOverlay">
        <div class="wi">📡</div>
        <p id="waitText">等待對方連線…</p>
      </div>
      <div id="vidControls">
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="靜音">🎤</button>
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()" title="關鏡頭">📷</button>
        <button class="ctrl-btn end" onclick="endCall()" title="結束">📵</button>
      </div>
    </div>

  </div>

  <!-- BOTTOM: typer input -->
  <div id="inputArea">
    <div id="inputRow">
      <textarea id="msgInput" placeholder="輸入文字…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>傳送</button>
    </div>
    <div id="scrollControls">
      <span id="scrollStatus">遠端捲動控制</span>
      <button class="scroll-btn" onclick="remoteScroll('up')">▲ 往上</button>
      <button class="scroll-btn" onclick="remoteScroll('down')">▼ 往下</button>
    </div>
  </div>

  <!-- BOTTOM: viewer font control -->
  <div id="fontControl">
    <span>字</span>
    <input type="range" min="20" max="48" value="28" id="fontSlider" oninput="updateFont(this.value)">
    <span style="font-size:18px">字</span>
    <span id="fontLabel">28px</span>
  </div>
</div>

<script>
  let peer, conn = null, call = null, localStream = null;
  let captions = [], fontSize = 28, myPeerId = '';
  let micOn = true, camOn = true;
  let isTyper = false;
  let allText = ''; // all text ever sent

  const params = new URLSearchParams(window.location.search);
  const joinId = params.get('join');

  window.addEventListener('load', () => {
    if (joinId) startAsViewer(joinId);
  });

  function randId() { return 'fam-' + Math.random().toString(36).slice(2, 10); }
  function makeShareLink(id) { return window.location.origin + window.location.pathname + '?join=' + id; }
  function peerConfig() {
    return {
      host: '0.peerjs.com', port: 443, path: '/', secure: true,
      config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    };
  }

  // ── RENDER VERTICAL TEXT ──
  function renderText(text) {
    const container = document.getElementById('captionText');
    const placeholder = document.getElementById('captionPlaceholder');
    if (placeholder) placeholder.style.display = 'none';

    // Clear existing char blocks
    container.querySelectorAll('.char-block').forEach(el => el.remove());

    // Render each character as a block
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      const div = document.createElement('div');
      if (ch === '\n' || ch === ' ') {
        div.className = 'char-block space';
      } else {
        div.className = 'char-block';
        div.textContent = ch;
        div.style.fontSize = fontSize + 'px';
      }
      container.appendChild(div);
    }

    updateScrollHint();
  }

  function updateScrollHint() {
    const el = document.getElementById('captionScroll');
    const remaining = el.scrollHeight - el.scrollTop - el.clientHeight;
    const hint = document.getElementById('scrollHint');
    if (remaining > 20) {
      hint.textContent = '▼ 還有更多';
    } else {
      hint.textContent = '';
    }
  }

  // ── SCROLL ──
  function scrollCaption(direction) {
    const el = document.getElementById('captionScroll');
    const amount = el.clientHeight * 0.7;
    el.scrollBy({ top: direction === 'down' ? amount : -amount, behavior: 'smooth' });
    setTimeout(updateScrollHint, 400);
  }

  function remoteScroll(direction) {
    // Scroll our own view
    scrollCaption(direction);
    // Send scroll command to viewer
    if (conn && conn.open) {
      conn.send({ type: 'scroll', direction });
    }
    // Update status
    const status = document.getElementById('scrollStatus');
    status.textContent = direction === 'down' ? '↓ 已向下捲動' : '↑ 已向上捲動';
    setTimeout(() => { status.textContent = '遠端捲動控制'; }, 1500);
  }

  // ── MIC / CAM ──
  function toggleMic() {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    const btn = document.getElementById('micBtn');
    btn.textContent = micOn ? '🎤' : '🔇';
    btn.classList.toggle('off', !micOn);
  }

  function toggleCam() {
    if (!localStream) return;
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    const btn = document.getElementById('camBtn');
    btn.textContent = camOn ? '📷' : '🚫';
    btn.classList.toggle('off', !camOn);
    document.getElementById('localVideo').style.opacity = camOn ? '1' : '0.3';
  }

  // ── TYPER ──
  async function startAsTyper() {
    isTyper = true;
    document.getElementById('joinBtn').disabled = true;
    document.getElementById('status').textContent = '取得相機中…';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch(e) {
      document.getElementById('status').textContent = '無法取得相機，請確認權限';
      document.getElementById('status').className = 'err';
      document.getElementById('joinBtn').disabled = false;
      return;
    }
    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('status').textContent = '錯誤：' + e.type; });
    peer.on('open', () => {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      document.getElementById('inputArea').style.display = 'flex';

      const link = makeShareLink(myPeerId);
      document.getElementById('shareLink').textContent = link;
      document.getElementById('shareModal').classList.add('show');

      peer.on('connection', c => {
        conn = c;
        conn.on('open', () => {
          document.getElementById('sendBtn').disabled = false;
          // Send existing text to new viewer
          if (allText) conn.send({ type: 'text', text: allText });
        });
      });
      peer.on('call', incoming => {
        call = incoming;
        call.answer(localStream);
        call.on('stream', s => {
          document.getElementById('remoteVideo').srcObject = s;
          document.getElementById('waitOverlay').style.display = 'none';
        });
      });
    });
  }

  // ── VIEWER ──
  async function startAsViewer(targetId) {
    isTyper = false;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('connectingScreen').style.display = 'flex';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
    } catch(e) {
      document.getElementById('connectErr').textContent = '無法取得相機，請確認權限';
      return;
    }
    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('connectErr').textContent = '連線錯誤：' + e.type; });
    peer.on('open', () => {
      conn = peer.connect(targetId);
      conn.on('open', () => {
        conn.on('data', onData);
        showViewerCallScreen();
      });
      conn.on('error', () => {
        document.getElementById('connectErr').textContent = '連線失敗，請確認對方已開啟通話';
      });
      call = peer.call(targetId, localStream);
      call.on('stream', s => {
        document.getElementById('remoteVideo').srcObject = s;
        document.getElementById('waitOverlay').style.display = 'none';
      });
    });
  }

  function showViewerCallScreen() {
    document.getElementById('connectingScreen').style.display = 'none';
    document.getElementById('callScreen').style.display = 'flex';
    document.getElementById('fontControl').style.display = 'flex';
    document.getElementById('waitOverlay').querySelector('p').textContent = '等待視訊連線…';
  }

  // ── RECEIVE DATA (viewer) ──
  function onData(msg) {
    if (msg.type === 'text') {
      allText = msg.text;
      renderText(allText);
    } else if (msg.type === 'scroll') {
      scrollCaption(msg.direction);
    }
  }

  // ── SEND ──
  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    // Append to allText with newline separator
    if (allText.length > 0) allText += '\n';
    allText += text;

    // Render locally
    renderText(allText);

    // Scroll to bottom on our side
    setTimeout(() => {
      const el = document.getElementById('captionScroll');
      el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
      updateScrollHint();
    }, 50);

    // Send full text to viewer (so they always have complete version)
    if (conn && conn.open) {
      conn.send({ type: 'text', text: allText });
    }

    input.value = '';
    input.focus();
  }

  function updateFont(val) {
    fontSize = parseInt(val);
    document.getElementById('fontLabel').textContent = val + 'px';
    // Re-render with new size
    if (allText) renderText(allText);
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('shareLink').textContent).catch(() => {});
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製！';
    setTimeout(() => btn.textContent = '複製連結', 2000);
  }

  function endCall() {
    if (call) { call.close(); call = null; }
    if (conn) { conn.close(); conn = null; }
    if (peer) { peer.destroy(); peer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    micOn = true; camOn = true; allText = '';
    window.history.replaceState({}, '', window.location.pathname);
    location.reload();
  }

  // Enter to send
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement?.id === 'msgInput') {
      e.preventDefault(); sendMsg();
    }
  });

  // Update scroll hint on manual scroll
  document.addEventListener('scroll', () => updateScrollHint(), true);
</script>
</body>
</html>
