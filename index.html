<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>家人通話</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://meet.jit.si/external_api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: rgba(255,255,255,0.08);
      --accent: #2ea043;
      --accent2: #388bfd;
      --text: #e6edf3;
      --muted: rgba(230,237,243,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }

    /* ── LOBBY ── */
    #lobby {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 32px 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,160,67,0.12) 0%, transparent 70%),
                  var(--bg);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #2ea043, #388bfd);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(46,160,67,0.3);
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .card input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .card input:focus {
      border-color: var(--accent2);
    }

    .role-row {
      display: flex;
      gap: 10px;
    }

    .role-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .role-btn.active {
      border-color: var(--accent2);
      color: var(--text);
      background: rgba(56,139,253,0.1);
    }

    .role-btn .role-icon { font-size: 22px; display: block; margin-bottom: 4px; }

    .join-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2ea043, #26a641);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(46,160,67,0.35);
    }

    .join-btn:active { transform: scale(0.98); }
    .join-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── CALL SCREEN ── */
    #callScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* Video half */
    #videoWrap {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 0;
    }

    #jitsiContainer {
      width: 100%;
      height: 100%;
    }

    #jitsiContainer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Caption half */
    #captionArea {
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* VIEWER mode: big text display */
    #captionDisplay {
      flex: 1;
      padding: 20px 20px 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      overflow: hidden;
      min-height: 180px;
    }

    .caption-line {
      line-height: 1.3;
      transition: all 0.25s ease;
    }

    .caption-line.old {
      color: var(--muted);
    }

    .caption-line.current {
      color: #fff;
      font-weight: 700;
    }

    /* TYPER mode: input */
    #typerArea {
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #typerArea textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 18px;
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 80px;
      transition: border-color 0.2s;
    }

    #typerArea textarea:focus { border-color: var(--accent2); }

    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #388bfd, #1f6feb);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(56,139,253,0.3);
      transition: all 0.2s;
    }

    .send-btn:active { transform: scale(0.98); }

    /* Font size control (viewer) */
    #fontControl {
      padding: 10px 16px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #fontControl span { font-size: 12px; color: var(--muted); }
    #fontControl input[type=range] {
      flex: 1;
      accent-color: var(--accent2);
    }
    #fontLabel {
      font-size: 12px;
      color: var(--accent2);
      min-width: 36px;
      text-align: right;
    }

    /* Top bar */
    #topBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    .room-badge {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .end-btn {
      background: rgba(239,68,68,0.8);
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .placeholder-text {
      color: rgba(255,255,255,0.18);
      font-size: 18px;
      text-align: center;
      margin: auto;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="lobby">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <h1>家人通話</h1>
    <p>視訊通話 + 大字幕，讓溝通更輕鬆</p>
  </div>

  <div class="card">
    <div>
      <label>房間名稱（兩端要一樣）</label>
      <input type="text" id="roomInput" placeholder="例如：我家" value="我家" />
    </div>

    <div>
      <label>你的角色</label>
      <div class="role-row">
        <button class="role-btn active" id="roleTyper" onclick="setRole('typer')">
          <span class="role-icon">⌨️</span>打字的人
        </button>
        <button class="role-btn" id="roleViewer" onclick="setRole('viewer')">
          <span class="role-icon">👴</span>看字的人
        </button>
      </div>
    </div>

    <button class="join-btn" onclick="joinCall()">進入通話</button>
  </div>
</div>

<!-- ══ CALL SCREEN ══ -->
<div id="callScreen">
  <!-- Video top half -->
  <div id="videoWrap">
    <div id="jitsiContainer"></div>
    <div id="topBar">
      <span class="room-badge" id="roomBadge"></span>
      <button class="end-btn" onclick="endCall()">結束通話</button>
    </div>
  </div>

  <!-- Caption bottom half -->
  <div id="captionArea">

    <!-- VIEWER: big caption display -->
    <div id="captionDisplay" style="display:none;">
      <div class="placeholder-text" id="captionPlaceholder">等待對方傳送訊息…</div>
    </div>
    <div id="fontControl" style="display:none;">
      <span>A</span>
      <input type="range" min="28" max="88" value="52" id="fontSlider" oninput="updateFont(this.value)">
      <span style="font-size:22px">A</span>
      <span id="fontLabel">52px</span>
    </div>

    <!-- TYPER: text input -->
    <div id="typerArea" style="display:none;">
      <textarea id="msgInput" placeholder="輸入要說的話，按傳送後對方會看到大字…" rows="3"></textarea>
      <button class="send-btn" onclick="sendMessage()">傳送 ➤</button>
    </div>

  </div>
</div>

<script>
  let api = null;
  let role = 'typer';
  let captions = [];
  let fontSize = 52;

  function setRole(r) {
    role = r;
    document.getElementById('roleTyper').classList.toggle('active', r === 'typer');
    document.getElementById('roleViewer').classList.toggle('active', r === 'viewer');
  }

  function joinCall() {
    const roomRaw = document.getElementById('roomInput').value.trim() || '家人通話';
    // Jitsi room names must be URL-safe
    const roomName = 'familycaption-' + encodeURIComponent(roomRaw).replace(/%/g, '').toLowerCase();

    document.getElementById('lobby').style.display = 'none';
    document.getElementById('callScreen').style.display = 'flex';
    document.getElementById('roomBadge').textContent = '房間：' + roomRaw;

    // Show correct UI for role
    if (role === 'viewer') {
      document.getElementById('captionDisplay').style.display = 'flex';
      document.getElementById('fontControl').style.display = 'flex';
    } else {
      document.getElementById('typerArea').style.display = 'flex';
    }

    // Init Jitsi
    api = new JitsiMeetExternalAPI('meet.jit.si', {
      roomName: roomName,
      parentNode: document.getElementById('jitsiContainer'),
      lang: 'zh',
      configOverwrite: {
        startWithAudioMuted: false,
        startWithVideoUnmuted: true,
        disableDeepLinking: true,
        prejoinPageEnabled: false,
        toolbarButtons: ['microphone', 'camera', 'hangup'],
      },
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_BRAND_WATERMARK: false,
        DEFAULT_REMOTE_DISPLAY_NAME: '家人',
        TOOLBAR_ALWAYS_VISIBLE: false,
        MOBILE_APP_PROMO: false,
        filmStripOnly: false,
      },
    });

    // Listen for incoming chat messages (used as caption channel)
    api.addListener('incomingMessage', (event) => {
      if (role === 'viewer') {
        showCaption(event.message);
      }
    });
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !api) return;

    api.executeCommand('sendChatMessage', text);
    input.value = '';
    input.focus();
  }

  // Allow Enter to send (Shift+Enter for newline)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && role === 'typer') {
      const active = document.activeElement;
      if (active && active.id === 'msgInput') {
        e.preventDefault();
        sendMessage();
      }
    }
  });

  function showCaption(text) {
    const placeholder = document.getElementById('captionPlaceholder');
    if (placeholder) placeholder.style.display = 'none';

    captions.push(text);
    if (captions.length > 3) captions = captions.slice(-3);

    const display = document.getElementById('captionDisplay');
    display.innerHTML = '';

    captions.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'caption-line ' + (i === captions.length - 1 ? 'current' : 'old');
      div.style.fontSize = i === captions.length - 1
        ? fontSize + 'px'
        : Math.max(fontSize - 18, 20) + 'px';
      div.textContent = line;
      display.appendChild(div);
    });
  }

  function updateFont(val) {
    fontSize = parseInt(val);
    document.getElementById('fontLabel').textContent = val + 'px';
    // Re-render captions with new size
    if (captions.length > 0) showCaption(captions[captions.length - 1]);
  }

  function endCall() {
    if (api) {
      api.executeCommand('hangup');
      api.dispose();
      api = null;
    }
    captions = [];
    document.getElementById('callScreen').style.display = 'none';
    document.getElementById('captionDisplay').innerHTML = '';
    document.getElementById('captionDisplay').style.display = 'none';
    document.getElementById('fontControl').style.display = 'none';
    document.getElementById('typerArea').style.display = 'none';
    document.getElementById('lobby').style.display = 'flex';
  }
</script>
</body>
</html>
