<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>家人通話</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: rgba(255,255,255,0.09);
      --accent: #2ea043; --blue: #388bfd; --text: #e6edf3; --muted: rgba(230,237,243,0.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* LOBBY */
    #lobby {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,160,67,0.1) 0%, transparent 65%), var(--bg);
    }
    .logo { text-align: center; }
    .logo-icon {
      width: 70px; height: 70px; border-radius: 20px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #2ea043, #388bfd);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
      box-shadow: 0 8px 28px rgba(46,160,67,0.28);
    }
    .logo h1 { font-size: 26px; font-weight: 900; }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card {
      width: 100%; max-width: 370px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .join-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2ea043, #26a641); color: #fff;
      font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 18px rgba(46,160,67,0.32);
    }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
    #status.err { color: #f85149; }

    /* CONNECTING */
    #connectingScreen {
      display: none; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; padding: 32px; background: var(--bg);
    }
    #connectingScreen .ci { font-size: 60px; animation: spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #connectingScreen h2 { font-size: 20px; font-weight: 700; }
    #connectingScreen p { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }

    /* CALL SCREEN */
    #callScreen { display: none; height: 100vh; height: 100dvh; flex-direction: column; }
    #callTop { flex: 1; display: flex; min-height: 0; }

    /* LEFT: caption strip */
    #captionStrip {
      width: 33.333%;
      background: #080b10;
      border-right: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    #captionStrip:active { cursor: grabbing; }

    #captionScroll {
      height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-width: none;
      touch-action: none;
    }
    #captionScroll::-webkit-scrollbar { display: none; }

    #captionText {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0 60px;
    }

    .char-el {
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      color: #fff;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }

    /* Highlight = what viewer currently sees */
    .char-el.in-view {
      background: rgba(56,139,253,0.25);
      color: #93c5fd;
    }
    /* Top/bottom boundary markers */
    .char-el.view-top {
      background: rgba(56,139,253,0.35);
      color: #60a5fa;
      border-top: 2px solid #388bfd;
    }
    .char-el.view-bottom {
      background: rgba(56,139,253,0.35);
      color: #60a5fa;
      border-bottom: 2px solid #388bfd;
    }

    .char-space { width: 100%; }

    /* fade top/bottom */
    #captionStrip::before, #captionStrip::after {
      content: ''; position: absolute; left: 0; right: 0; z-index: 2; pointer-events: none;
    }
    #captionStrip::before { top: 0; height: 28px; background: linear-gradient(to bottom, #080b10, transparent); }
    #captionStrip::after  { bottom: 0; height: 48px; background: linear-gradient(to top, #080b10, transparent); }

    /* Legend (typer only) */
    #viewLegend {
      position: absolute; bottom: 8px; left: 0; right: 0;
      text-align: center; font-size: 10px; z-index: 3; pointer-events: none;
    }
    #viewLegendText { color: rgba(255,255,255,0.25); }
    #viewLegendHighlight {
      display: inline-block; width: 8px; height: 8px; border-radius: 2px;
      background: rgba(56,139,253,0.4); vertical-align: middle; margin-right: 3px;
    }

    #captionPlaceholder {
      color: rgba(255,255,255,0.12); font-size: 13px;
      text-align: center; padding: 24px 8px; line-height: 2.2; width: 100%;
    }

    /* RIGHT: video */
    #videoWrap { flex: 1; position: relative; background: #000; overflow: hidden; }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
    #localVideo {
      position: absolute; bottom: 58px; right: 8px;
      width: 72px; height: 96px; border-radius: 8px;
      object-fit: cover; border: 2px solid rgba(255,255,255,0.18); background: #111;
    }
    #waitOverlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
      background: rgba(0,0,0,0.6);
    }
    #waitOverlay .wi { font-size: 38px; }
    #waitOverlay p { font-size: 12px; text-align: center; line-height: 1.7; padding: 0 10px; }
    #vidControls {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 10px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; background: rgba(255,255,255,0.15); transition: all 0.15s;
    }
    .ctrl-btn.off { background: rgba(248,81,73,0.75); }
    .ctrl-btn.end { background: rgba(248,81,73,0.9); width: 48px; height: 48px; }
    .ctrl-btn:active { transform: scale(0.9); }

    /* BOTTOM: input (typer) */
    #inputArea {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 12px 14px; display: none; gap: 8px; align-items: flex-end;
    }
    #msgInput {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: 16px; color: var(--text);
      font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 100px;
    }
    #msgInput:focus { border-color: var(--blue); }
    .send-btn {
      padding: 10px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #388bfd, #1f6feb); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; height: 44px;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MODALS */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center; z-index: 100; padding: 24px;
    }
    .modal-bg.show { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-card h2 { font-size: 18px; font-weight: 700; }
    .modal-card p { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .link-box {
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: var(--blue); border: 1px solid var(--border);
      word-break: break-all; line-height: 1.5;
    }
    .btn-blue {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: rgba(56,139,253,0.15); color: var(--blue);
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-green {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <h1>家人通話</h1>
    <p>視訊通話 + 大字幕，讓溝通更輕鬆</p>
  </div>
  <div class="card">
    <p style="font-size:14px;color:var(--muted);line-height:1.7;">
      按下「開始通話」，App 會產生一個連結。<br>
      把連結傳給外公，外公點開就自動加入。
    </p>
    <div id="status"></div>
    <button class="join-btn" id="joinBtn" onclick="startAsTyper()">開始通話</button>
  </div>
</div>

<!-- CONNECTING -->
<div id="connectingScreen">
  <div class="ci">📡</div>
  <h2>連線中…</h2>
  <p>正在連接到對方，請稍候。</p>
  <div id="connectErr" style="font-size:13px;color:#f85149;text-align:center;margin-top:8px;"></div>
</div>

<!-- SHARE MODAL -->
<div class="modal-bg" id="shareModal">
  <div class="modal-card">
    <h2>📤 傳連結給外公</h2>
    <p>用 LINE 把這個連結傳給外公，外公點開就會自動加入。</p>
    <div class="link-box" id="shareLink"></div>
    <button class="btn-blue" id="copyBtn" onclick="copyLink()">複製連結</button>
    <button class="btn-green" onclick="document.getElementById('shareModal').classList.remove('show')">好，等外公連線</button>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
  <div id="callTop">

    <!-- LEFT: caption strip -->
    <div id="captionStrip">
      <div id="captionScroll">
        <div id="captionText">
          <div id="captionPlaceholder">等待<br>訊息<br>…</div>
        </div>
      </div>
      <!-- Legend shown only to typer -->
      <div id="viewLegend" style="display:none;">
        <span id="viewLegendHighlight"></span>
        <span id="viewLegendText">外公目前看到的字</span>
      </div>
    </div>

    <!-- RIGHT: video -->
    <div id="videoWrap">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay playsinline muted></video>
      <div id="waitOverlay">
        <div class="wi">📡</div>
        <p id="waitText">等待對方連線…</p>
      </div>
      <div id="vidControls">
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">📷</button>
        <button class="ctrl-btn end" onclick="endCall()">📵</button>
      </div>
    </div>

  </div>

  <!-- BOTTOM: typer input -->
  <div id="inputArea">
    <textarea id="msgInput" placeholder="輸入文字…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>傳送</button>
  </div>
</div>

<script>
  let peer, conn = null, call = null, localStream = null;
  let myPeerId = '', allText = '', charFontSize = 32;
  let micOn = true, camOn = true, isTyper = false;
  // charElements[i] corresponds to allText[i] (excluding \n which are spacers)
  let charElements = [];

  const params = new URLSearchParams(window.location.search);
  const joinId = params.get('join');

  window.addEventListener('load', () => {
    if (joinId) startAsViewer(joinId);
    calcFontSize();
    window.addEventListener('resize', () => { calcFontSize(); if (allText) renderText(allText); });
  });

  function calcFontSize() {
    charFontSize = Math.floor(window.innerWidth * 0.333 * 0.82);
  }

  // ── RENDER ──
  function renderText(text) {
    const container = document.getElementById('captionText');
    const placeholder = document.getElementById('captionPlaceholder');
    if (placeholder) placeholder.style.display = 'none';
    container.querySelectorAll('.char-el, .char-space').forEach(el => el.remove());
    charElements = [];

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '\n') {
        const sp = document.createElement('div');
        sp.className = 'char-space';
        sp.style.height = Math.round(charFontSize * 0.5) + 'px';
        container.appendChild(sp);
        charElements.push(null); // placeholder for \n
      } else {
        const div = document.createElement('div');
        div.className = 'char-el';
        div.textContent = ch;
        div.style.fontSize = charFontSize + 'px';
        div.style.lineHeight = (charFontSize * 1.15) + 'px';
        container.appendChild(div);
        charElements.push(div);
      }
    }
  }

  // ── VIEWPORT REPORTING (viewer → typer) ──
  // Viewer reports which char indices are visible on screen
  function getVisibleCharRange() {
    const scrollEl = document.getElementById('captionScroll');
    const top = scrollEl.scrollTop;
    const bottom = top + scrollEl.clientHeight;
    let first = -1, last = -1;

    for (let i = 0; i < charElements.length; i++) {
      const el = charElements[i];
      if (!el) continue;
      const elTop = el.offsetTop;
      const elBottom = elTop + el.offsetHeight;
      if (elBottom > top && elTop < bottom) {
        if (first === -1) first = i;
        last = i;
      }
    }
    return { first, last };
  }

  let viewportReportTimer = null;
  function scheduleViewportReport() {
    if (viewportReportTimer) return;
    viewportReportTimer = setTimeout(() => {
      viewportReportTimer = null;
      if (conn && conn.open) {
        const range = getVisibleCharRange();
        conn.send({ type: 'viewport', first: range.first, last: range.last });
      }
    }, 80);
  }

  // ── HIGHLIGHT VIEWER'S VIEW (typer side) ──
  function applyViewportHighlight(first, last) {
    // Clear all highlights
    charElements.forEach(el => {
      if (!el) return;
      el.classList.remove('in-view', 'view-top', 'view-bottom');
    });
    if (first === -1 || last === -1) return;

    for (let i = 0; i < charElements.length; i++) {
      const el = charElements[i];
      if (!el) continue;
      if (i >= first && i <= last) {
        el.classList.add('in-view');
        if (i === first) el.classList.add('view-top');
        if (i === last) el.classList.add('view-bottom');
      }
    }

    // Auto-scroll typer's strip to keep highlight visible
    const firstEl = charElements[first];
    const lastEl = charElements[last];
    if (firstEl && lastEl) {
      const scrollEl = document.getElementById('captionScroll');
      const stripTop = scrollEl.scrollTop;
      const stripBottom = stripTop + scrollEl.clientHeight;
      const elTop = firstEl.offsetTop;
      const elBottom = lastEl.offsetTop + lastEl.offsetHeight;
      // If highlight is mostly out of view, scroll to it
      if (elTop < stripTop || elBottom > stripBottom) {
        scrollEl.scrollTo({ top: elTop - 40, behavior: 'smooth' });
      }
    }
  }

  // ── DRAG / SWIPE SCROLL ──
  function initDragScroll(el, onScrollCallback) {
    let startY = 0, startScroll = 0, isDragging = false;
    let velY = 0, lastY = 0, lastT = 0, rafId = null;

    function onStart(y) {
      isDragging = true; startY = y; startScroll = el.scrollTop;
      velY = 0; lastY = y; lastT = Date.now();
      if (rafId) cancelAnimationFrame(rafId);
    }
    function onMove(y) {
      if (!isDragging) return;
      el.scrollTop = startScroll + (startY - y);
      const now = Date.now(); const dt = now - lastT || 1;
      velY = (lastY - y) / dt * 16; lastY = y; lastT = now;
      if (onScrollCallback) onScrollCallback();
    }
    function onEnd() {
      isDragging = false;
      function momentum() {
        if (Math.abs(velY) < 0.5) return;
        el.scrollTop += velY; velY *= 0.92;
        if (onScrollCallback) onScrollCallback();
        rafId = requestAnimationFrame(momentum);
      }
      momentum();
    }

    el.addEventListener('mousedown', e => { onStart(e.clientY); e.preventDefault(); });
    window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientY); });
    window.addEventListener('mouseup', () => onEnd());
    el.addEventListener('touchstart', e => { onStart(e.touches[0].clientY); }, { passive: true });
    el.addEventListener('touchmove', e => { onMove(e.touches[0].clientY); e.preventDefault(); }, { passive: false });
    el.addEventListener('touchend', () => onEnd());
  }

  // ── MIC / CAM ──
  function toggleMic() {
    micOn = !micOn;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    const btn = document.getElementById('micBtn');
    btn.textContent = micOn ? '🎤' : '🔇'; btn.classList.toggle('off', !micOn);
  }
  function toggleCam() {
    camOn = !camOn;
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    const btn = document.getElementById('camBtn');
    btn.textContent = camOn ? '📷' : '🚫'; btn.classList.toggle('off', !camOn);
    document.getElementById('localVideo').style.opacity = camOn ? '1' : '0.3';
  }

  function randId() { return 'fam-' + Math.random().toString(36).slice(2, 10); }
  function makeShareLink(id) { return window.location.origin + window.location.pathname + '?join=' + id; }
  function peerConfig() {
    return {
      host: '0.peerjs.com', port: 443, path: '/', secure: true,
      config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    };
  }
  async function getMedia() {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
  }

  // ── TYPER ──
  async function startAsTyper() {
    isTyper = true;
    document.getElementById('joinBtn').disabled = true;
    document.getElementById('status').textContent = '取得相機中…';
    try { await getMedia(); }
    catch(e) {
      document.getElementById('status').textContent = '無法取得相機，請確認權限';
      document.getElementById('status').className = 'err';
      document.getElementById('joinBtn').disabled = false; return;
    }
    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('status').textContent = '錯誤：' + e.type; });
    peer.on('open', () => {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      document.getElementById('inputArea').style.display = 'flex';
      document.getElementById('viewLegend').style.display = 'block';

      // Typer drag → sync scroll position to viewer
      initDragScroll(document.getElementById('captionScroll'), () => {
        if (conn && conn.open) {
          const el = document.getElementById('captionScroll');
          const pct = el.scrollTop / (el.scrollHeight - el.clientHeight || 1);
          conn.send({ type: 'scrollPct', pct });
        }
      });

      const link = makeShareLink(myPeerId);
      document.getElementById('shareLink').textContent = link;
      document.getElementById('shareModal').classList.add('show');

      peer.on('connection', c => {
        conn = c;
        conn.on('open', () => {
          document.getElementById('sendBtn').disabled = false;
          if (allText) conn.send({ type: 'text', text: allText });
        });
        conn.on('data', msg => {
          // Receive viewport info from viewer
          if (msg.type === 'viewport') {
            applyViewportHighlight(msg.first, msg.last);
          }
        });
      });
      peer.on('call', incoming => {
        call = incoming; call.answer(localStream);
        call.on('stream', s => {
          document.getElementById('remoteVideo').srcObject = s;
          document.getElementById('waitOverlay').style.display = 'none';
        });
      });
    });
  }

  // ── VIEWER ──
  async function startAsViewer(targetId) {
    isTyper = false;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('connectingScreen').style.display = 'flex';
    try { await getMedia(); }
    catch(e) { document.getElementById('connectErr').textContent = '無法取得相機，請確認權限'; return; }

    myPeerId = randId();
    peer = new Peer(myPeerId, peerConfig());
    peer.on('error', e => { document.getElementById('connectErr').textContent = '連線錯誤：' + e.type; });
    peer.on('open', () => {
      conn = peer.connect(targetId);
      conn.on('open', () => {
        conn.on('data', onData);
        document.getElementById('connectingScreen').style.display = 'none';
        document.getElementById('callScreen').style.display = 'flex';

        // Viewer drag → report viewport back to typer
        initDragScroll(document.getElementById('captionScroll'), scheduleViewportReport);

        document.getElementById('waitOverlay').querySelector('p').textContent = '等待視訊連線…';
      });
      conn.on('error', () => { document.getElementById('connectErr').textContent = '連線失敗，請確認對方已開啟通話'; });
      call = peer.call(targetId, localStream);
      call.on('stream', s => {
        document.getElementById('remoteVideo').srcObject = s;
        document.getElementById('waitOverlay').style.display = 'none';
      });
    });
  }

  // ── RECEIVE DATA ──
  function onData(msg) {
    if (msg.type === 'text') {
      allText = msg.text;
      renderText(allText);
      // Report current viewport after render
      setTimeout(scheduleViewportReport, 100);
    } else if (msg.type === 'scrollPct') {
      // Typer scrolled → move viewer
      const el = document.getElementById('captionScroll');
      el.scrollTop = msg.pct * (el.scrollHeight - el.clientHeight);
      setTimeout(scheduleViewportReport, 100);
    }
  }

  // ── SEND ──
  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    if (allText.length > 0) allText += '\n';
    allText += text;
    renderText(allText);
    setTimeout(() => {
      const el = document.getElementById('captionScroll');
      el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
    }, 50);
    if (conn && conn.open) conn.send({ type: 'text', text: allText });
    input.value = ''; input.focus();
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('shareLink').textContent).catch(() => {});
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製！';
    setTimeout(() => btn.textContent = '複製連結', 2000);
  }

  function endCall() {
    if (call) { call.close(); call = null; }
    if (conn) { conn.close(); conn = null; }
    if (peer) { peer.destroy(); peer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    micOn = true; camOn = true; allText = ''; charElements = [];
    window.history.replaceState({}, '', window.location.pathname);
    location.reload();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement?.id === 'msgInput') {
      e.preventDefault(); sendMsg();
    }
  });
</script>
</body>
</html>
