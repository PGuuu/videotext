<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>家人通話</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: rgba(255,255,255,0.09);
      --accent: #2ea043; --blue: #388bfd; --text: #e6edf3; --muted: rgba(230,237,243,0.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* ── LOBBY ── */
    #lobby {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,160,67,0.1) 0%, transparent 65%), var(--bg);
    }
    .logo { text-align: center; }
    .logo-icon {
      width: 70px; height: 70px; border-radius: 20px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #2ea043, #388bfd);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
      box-shadow: 0 8px 28px rgba(46,160,67,0.28);
    }
    .logo h1 { font-size: 26px; font-weight: 900; }
    .logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card {
      width: 100%; max-width: 370px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .join-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2ea043, #26a641); color: #fff;
      font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 18px rgba(46,160,67,0.32);
    }
    .join-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
    #status.err { color: #f85149; }

    /* ── CONNECTING ── */
    #connectingScreen {
      display: none; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; padding: 32px; background: var(--bg);
    }
    #connectingScreen .ci { font-size: 60px; animation: spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #connectingScreen h2 { font-size: 20px; font-weight: 700; }
    #connectingScreen p  { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }

    /* ── CALL SCREEN ── */
    #callScreen { display: none; height: 100vh; height: 100dvh; flex-direction: column; }
    #callTop    { flex: 1; display: flex; min-height: 0; }

    /* Caption strip */
    #captionStrip {
      width: 33.333%; background: #080b10;
      border-right: 1px solid rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
      cursor: grab; user-select: none; touch-action: none;
      display: flex; flex-direction: column;
    }
    #captionStrip:active { cursor: grabbing; }
    #stripLabel {
      display: none; padding: 5px 0; text-align: center;
      font-size: 10px; color: rgba(56,139,253,0.8);
      background: rgba(56,139,253,0.1);
      border-bottom: 1px solid rgba(56,139,253,0.2);
      flex-shrink: 0; pointer-events: none; z-index: 3;
    }
    #captionScroll {
      flex: 1; overflow-y: scroll; overflow-x: hidden;
      scrollbar-width: none; touch-action: none;
    }
    #captionScroll::-webkit-scrollbar { display: none; }
    #captionText {
      display: flex; flex-direction: column; align-items: center; padding: 16px 0 60px;
    }
    .char-el {
      font-weight: 900; line-height: 1.15; text-align: center; color: #fff; width: 100%;
    }
    .char-space { width: 100%; }
    #captionStrip::before, #captionStrip::after {
      content: ''; position: absolute; left: 0; right: 0; z-index: 2; pointer-events: none;
    }
    #captionStrip::before { top: 0; height: 28px; background: linear-gradient(to bottom, #080b10, transparent); }
    #captionStrip::after  { bottom: 0; height: 48px; background: linear-gradient(to top, #080b10, transparent); }
    #captionPlaceholder {
      color: rgba(255,255,255,0.12); font-size: 13px;
      text-align: center; padding: 24px 8px; line-height: 2.2; width: 100%;
    }

    /* Video area */
    #videoWrap { flex: 1; position: relative; background: #000; overflow: hidden; }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Local video: TOP RIGHT ── */
    #localVideo {
      position: absolute;
      top: 12px; right: 12px;
      width: 80px; height: 108px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.25);
      background: #111;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 5;
    }

    #waitOverlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
      background: rgba(0,0,0,0.6); z-index: 4;
    }
    #waitOverlay .wi { font-size: 38px; }
    #waitOverlay p { font-size: 12px; text-align: center; line-height: 1.7; padding: 0 10px; }

    /* ── Control bar ── */
    #vidControls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 16px 16px;
      display: flex; align-items: center; justify-content: center; gap: 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      z-index: 6;
    }

    /* Icon buttons — SVG style like the screenshot */
    .ctrl-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ctrl-btn svg { width: 22px; height: 22px; fill: #fff; }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn.off { background: rgba(248,81,73,0.75); }
    .ctrl-btn.off svg { fill: #fff; }
    .ctrl-btn.end {
      width: 56px; height: 56px;
      background: #e53e3e;
      box-shadow: 0 4px 18px rgba(229,62,62,0.45);
    }
    .ctrl-btn.end svg { width: 26px; height: 26px; }

    /* Input area */
    #inputArea {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 12px 14px; display: none; gap: 8px; align-items: flex-end;
    }
    #msgInput {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: 16px; color: var(--text);
      font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 120px;
    }
    #msgInput:focus { border-color: var(--blue); }
    .send-btn {
      padding: 10px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #388bfd, #1f6feb); color: #fff;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; height: 44px;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modals */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center; z-index: 100; padding: 24px;
    }
    .modal-bg.show { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-card h2 { font-size: 18px; font-weight: 700; }
    .modal-card p  { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .link-box {
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: var(--blue); border: 1px solid var(--border);
      word-break: break-all; line-height: 1.5;
    }
    .btn-blue {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: rgba(56,139,253,0.15); color: var(--blue);
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    }

    /* Ended screen */
    #endedScreen {
      display: none; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; padding: 32px; background: var(--bg);
    }
    #endedScreen .ei { font-size: 52px; }
    #endedScreen h2  { font-size: 20px; font-weight: 700; }
    #endedScreen p   { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <div class="logo-icon">📞</div>
    <h1>家人通話</h1>
    <p>視訊通話 + 大字幕，讓溝通更輕鬆</p>
  </div>
  <div class="card">
    <p style="font-size:14px;color:var(--muted);line-height:1.7;">
      按下「開始通話」，App 會產生一個連結。<br>把連結傳給外公，外公點開就自動加入。
    </p>
    <div id="status"></div>
    <button class="join-btn" id="joinBtn" onclick="startAsTyper()">開始通話</button>
  </div>
</div>

<!-- CONNECTING -->
<div id="connectingScreen">
  <div class="ci">📡</div>
  <h2>連線中…</h2>
  <p>正在連接到對方，請稍候。</p>
  <div id="connectErr" style="font-size:13px;color:#f85149;text-align:center;margin-top:8px;"></div>
</div>

<!-- ENDED (viewer sees this when typer hangs up) -->
<div id="endedScreen">
  <div class="ei">📵</div>
  <h2>通話已結束</h2>
  <p>對方已掛斷通話</p>
</div>

<!-- SHARE MODAL — only copy button, no dismiss button -->
<div class="modal-bg" id="shareModal">
  <div class="modal-card">
    <h2>📤 傳連結給外公</h2>
    <p>用 LINE 把這個連結傳給外公，外公點開就會自動加入。</p>
    <div class="link-box" id="shareLink"></div>
    <button class="btn-blue" id="copyBtn" onclick="copyLink()">複製連結</button>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="callScreen">
  <div id="callTop">

    <div id="captionStrip">
      <div id="stripLabel">👁 外公的畫面</div>
      <div id="captionScroll">
        <div id="captionText">
          <div id="captionPlaceholder">等待<br>訊息<br>…</div>
        </div>
      </div>
    </div>

    <div id="videoWrap">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo"  autoplay playsinline muted></video>

      <div id="waitOverlay">
        <div class="wi">📡</div>
        <p id="waitText">等待對方連線…</p>
      </div>

      <div id="vidControls">
        <!-- Mute mic -->
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="靜音">
          <svg id="micIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-6.5 9a.5.5 0 0 1 .5.5 6 6 0 0 0 12 0 .5.5 0 0 1 1 0 7 7 0 0 1-6.5 6.96V21h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-3.54A7 7 0 0 1 5 10.5a.5.5 0 0 1 .5-.5z"/>
          </svg>
        </button>

        <!-- Camera -->
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()" title="關閉鏡頭">
          <svg id="camIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1.586l3.707-3.707A1 1 0 0 1 22 5.586v12.828a1 1 0 0 1-1.707.707L17 15.414V17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z"/>
          </svg>
        </button>

        <!-- End call -->
        <button class="ctrl-btn end" onclick="endCall()" title="結束通話">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Typer input -->
  <div id="inputArea">
    <textarea id="msgInput" placeholder="輸入文字…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>傳送</button>
  </div>
</div>

<script>
  let peer, conn = null, call = null, localStream = null;
  let myPeerId = '', currentText = '';
  let micOn = true, camOn = true, isTyper = false;
  let iceServersCache = null;
  let viewerScreenWidth = 0, isMirrorMode = false;
  let suppressScroll = false;

  const params = new URLSearchParams(window.location.search);
  const joinId  = params.get('join');
  if (joinId) window.addEventListener('load', () => startAsViewer(joinId));

  function fontSizeFor(w) { return Math.floor(w * 0.333 * 0.82); }
  function myFontSize()   { return fontSizeFor(window.innerWidth); }
  function vFontSize()    { return viewerScreenWidth ? fontSizeFor(viewerScreenWidth) : myFontSize(); }

  async function getIceServers() {
    if (iceServersCache) return iceServersCache;
    try {
      const r = await fetch('https://paulgulla.metered.live/api/v1/turn/credentials?apiKey=c9122c7ffa5323cf3e1e2e5fed97b3346567');
      iceServersCache = await r.json(); return iceServersCache;
    } catch { return [{ urls: 'stun:stun.l.google.com:19302' }]; }
  }
  async function makePeer(id) {
    return new Peer(id, {
      host: '0.peerjs.com', port: 443, path: '/', secure: true,
      config: { iceServers: await getIceServers(), iceCandidatePoolSize: 10 }
    });
  }

  function renderText(text, fs) {
    const container = document.getElementById('captionText');
    const ph = document.getElementById('captionPlaceholder');
    if (ph) ph.style.display = 'none';
    container.querySelectorAll('.char-el,.char-space').forEach(e => e.remove());
    for (const ch of text) {
      if (ch === '\n') {
        const sp = document.createElement('div');
        sp.className = 'char-space';
        sp.style.height = Math.round(fs * 0.5) + 'px';
        container.appendChild(sp);
      } else {
        const d = document.createElement('div');
        d.className = 'char-el';
        d.textContent = ch;
        d.style.fontSize   = fs + 'px';
        d.style.lineHeight = (fs * 1.15) + 'px';
        container.appendChild(d);
      }
    }
  }

  let scrollTimer = null;
  function reportScroll() {
    if (scrollTimer) return;
    scrollTimer = setTimeout(() => {
      scrollTimer = null;
      if (!conn || !conn.open) return;
      const el = document.getElementById('captionScroll');
      const max = el.scrollHeight - el.clientHeight;
      conn.send({ type: 'viewerScroll', pct: max > 0 ? el.scrollTop / max : 0, screenWidth: window.innerWidth });
    }, 60);
  }

  function applyScroll(pct) {
    const el = document.getElementById('captionScroll');
    suppressScroll = true;
    el.scrollTop = pct * (el.scrollHeight - el.clientHeight);
    setTimeout(() => { suppressScroll = false; }, 200);
  }

  function initDragScroll(el, cb) {
    let sy=0, ss=0, drag=false, vel=0, ly=0, lt=0, raf=null;
    const start = y => { drag=true; sy=y; ss=el.scrollTop; vel=0; ly=y; lt=Date.now(); if(raf) cancelAnimationFrame(raf); };
    const move  = y => { if(!drag) return; el.scrollTop=ss+(sy-y); const now=Date.now(),dt=now-lt||1; vel=(ly-y)/dt*16; ly=y; lt=now; if(cb) cb(); };
    const end   = () => { drag=false; const go=()=>{ if(Math.abs(vel)<0.5) return; el.scrollTop+=vel; vel*=0.92; if(cb) cb(); raf=requestAnimationFrame(go); }; go(); };
    el.addEventListener('mousedown',  e => { start(e.clientY); e.preventDefault(); });
    window.addEventListener('mousemove', e => { if(drag) move(e.clientY); });
    window.addEventListener('mouseup',   () => end());
    el.addEventListener('touchstart', e => start(e.touches[0].clientY), {passive:true});
    el.addEventListener('touchmove',  e => { move(e.touches[0].clientY); e.preventDefault(); }, {passive:false});
    el.addEventListener('touchend',   () => end());
  }

  // SVG mic icons
  const MIC_ON  = `<path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-6.5 9a.5.5 0 0 1 .5.5 6 6 0 0 0 12 0 .5.5 0 0 1 1 0 7 7 0 0 1-6.5 6.96V21h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-3.54A7 7 0 0 1 5 10.5a.5.5 0 0 1 .5-.5z"/>`;
  const MIC_OFF = `<path d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l2.06 2.06A4 4 0 0 0 4 5v6a4 4 0 0 0 7.93.75l1.1 1.1A6 6 0 0 1 6 10.5a.5.5 0 0 0-1 0 7 7 0 0 0 6.5 6.96V21h-3a.5.5 0 0 0 0 1h7a.5.5 0 0 0 0-1h-3v-3.54c.82-.1 1.6-.35 2.3-.72l1.92 1.92a.75.75 0 1 0 1.06-1.06L3.28 2.22zM16 10.5c0 .5-.07.98-.2 1.44l1.1 1.1c.27-.79.43-1.63.1-2.54V5a4 4 0 0 0-7.63-1.68l1.45 1.45C11.1 4.32 11.51 4 12 4a3 3 0 0 1 3 3v3.5z"/>`;
  const CAM_ON  = `<path d="M2 7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1.586l3.707-3.707A1 1 0 0 1 22 5.586v12.828a1 1 0 0 1-1.707.707L17 15.414V17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z"/>`;
  const CAM_OFF = `<path d="M3.28 2.22a.75.75 0 0 0-1.06 1.06L4 5.06A2 2 0 0 0 2 7v10a2 2 0 0 0 2 2h11c.36 0 .7-.1 1-.26l1.72 1.72a.75.75 0 1 0 1.06-1.06l-1.48-1.48L17 17.94l.293.293A1 1 0 0 0 19 17.414v-2l3 3A1 1 0 0 0 24 17.586V6.414a1 1 0 0 0-1.707-.707L19 9V7a2 2 0 0 0-2-2H6.06L3.28 2.22zM19 11.414l2-2v5.172l-2-2v-1.172zM5.56 6.62 15.38 16.44A1 1 0 0 1 15 17H4a1 1 0 0 1-1-1V7a1 1 0 0 1 .56-.9L5.56 6.62z"/>`;

  function toggleMic() {
    micOn = !micOn;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    const btn = document.getElementById('micBtn');
    btn.querySelector('svg').innerHTML = micOn ? MIC_ON : MIC_OFF;
    btn.classList.toggle('off', !micOn);
  }
  function toggleCam() {
    camOn = !camOn;
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    const btn = document.getElementById('camBtn');
    btn.querySelector('svg').innerHTML = camOn ? CAM_ON : CAM_OFF;
    btn.classList.toggle('off', !camOn);
    document.getElementById('localVideo').style.opacity = camOn ? '1' : '0.4';
  }

  function randId()          { return 'fam-'+Math.random().toString(36).slice(2,10); }
  function makeShareLink(id) { return location.origin+location.pathname+'?join='+id; }
  async function getMedia()  {
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    document.getElementById('localVideo').srcObject = localStream;
  }

  // ── TYPER ──────────────────────────────────────────────────
  async function startAsTyper() {
    isTyper = true;
    document.getElementById('joinBtn').disabled = true;
    document.getElementById('status').textContent = '取得相機中…';
    try { await getMedia(); }
    catch {
      document.getElementById('status').textContent = '無法取得相機，請確認權限';
      document.getElementById('status').className = 'err';
      document.getElementById('joinBtn').disabled = false; return;
    }
    document.getElementById('status').textContent = '準備連線中…';
    myPeerId = randId();
    peer = await makePeer(myPeerId);
    peer.on('error', e => { document.getElementById('status').textContent = '錯誤：'+e.type; });
    peer.on('open', () => {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      document.getElementById('inputArea').style.display = 'flex';

      initDragScroll(document.getElementById('captionScroll'), () => {
        if (!conn || !conn.open || suppressScroll) return;
        const el = document.getElementById('captionScroll');
        const max = el.scrollHeight - el.clientHeight;
        conn.send({ type: 'scrollPct', pct: max > 0 ? el.scrollTop / max : 0 });
      });

      document.getElementById('shareLink').textContent = makeShareLink(myPeerId);
      document.getElementById('shareModal').classList.add('show');

      peer.on('connection', c => {
        conn = c;
        conn.on('open', () => {
          // Viewer connected: close share modal
          document.getElementById('shareModal').classList.remove('show');
          document.getElementById('sendBtn').disabled = false;
          if (currentText) conn.send({ type: 'text', text: currentText });
        });
        conn.on('data', msg => {
          if (msg.type === 'viewerScroll') {
            if (!isMirrorMode) {
              isMirrorMode = true;
              viewerScreenWidth = msg.screenWidth || window.innerWidth;
              document.getElementById('stripLabel').style.display = 'block';
              if (currentText) renderText(currentText, vFontSize());
            }
            if (msg.screenWidth) viewerScreenWidth = msg.screenWidth;
            applyScroll(msg.pct);
          }
        });
      });
      peer.on('call', inc => {
        call = inc; call.answer(localStream);
        call.on('stream', s => {
          document.getElementById('remoteVideo').srcObject = s;
          document.getElementById('waitOverlay').style.display = 'none';
        });
      });
    });
  }

  // ── VIEWER ─────────────────────────────────────────────────
  async function startAsViewer(targetId) {
    isTyper = false;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('connectingScreen').style.display = 'flex';
    try { await getMedia(); }
    catch { document.getElementById('connectErr').textContent = '無法取得相機，請確認權限'; return; }

    myPeerId = randId();
    peer = await makePeer(myPeerId);
    peer.on('error', e => { document.getElementById('connectErr').textContent = '連線錯誤：'+e.type; });
    peer.on('open', () => {
      conn = peer.connect(targetId, { reliable: true });
      conn.on('open', () => {
        conn.on('data', msg => {
          if (msg.type === 'text') {
            currentText = msg.text;
            renderText(currentText, myFontSize());
            document.getElementById('captionScroll').scrollTop = 0;
            setTimeout(reportScroll, 100);
          } else if (msg.type === 'scrollPct') {
            applyScroll(msg.pct);
            setTimeout(reportScroll, 200);
          } else if (msg.type === 'hangup') {
            // Typer hung up → show ended screen
            cleanupMedia();
            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('endedScreen').style.display = 'flex';
          }
        });
        document.getElementById('connectingScreen').style.display = 'none';
        document.getElementById('callScreen').style.display = 'flex';
        initDragScroll(document.getElementById('captionScroll'), () => { if (!suppressScroll) reportScroll(); });
        window.addEventListener('resize', reportScroll);
        reportScroll();
        document.getElementById('waitOverlay').querySelector('p').textContent = '等待視訊連線…';
      });
      conn.on('error', () => { document.getElementById('connectErr').textContent = '連線失敗，請確認對方已開啟通話'; });
      call = peer.call(targetId, localStream);
      call.on('stream', s => {
        document.getElementById('remoteVideo').srcObject = s;
        document.getElementById('waitOverlay').style.display = 'none';
      });
    });
  }

  // ── SEND (replace) ─────────────────────────────────────────
  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;
    currentText = text;
    renderText(currentText, isMirrorMode ? vFontSize() : myFontSize());
    document.getElementById('captionScroll').scrollTop = 0;
    if (conn && conn.open) conn.send({ type: 'text', text: currentText });
    input.value = ''; input.style.height = ''; input.focus();
  }

  window.addEventListener('load', () => {
    const ta = document.getElementById('msgInput');
    if (!ta) return;
    ta.addEventListener('input', () => { ta.style.height=''; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
  });

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('shareLink').textContent).catch(()=>{});
    const b = document.getElementById('copyBtn');
    b.textContent = '✓ 已複製！';
    setTimeout(() => b.textContent = '複製連結', 2000);
  }

  function cleanupMedia() {
    if (call) { try { call.close(); } catch{} call = null; }
    if (conn) { try { conn.close(); } catch{} conn = null; }
    if (peer) { try { peer.destroy(); } catch{} peer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  }

  function endCall() {
    // Notify viewer before closing
    if (conn && conn.open) {
      try { conn.send({ type: 'hangup' }); } catch {}
    }
    setTimeout(() => {
      cleanupMedia();
      micOn = true; camOn = true; currentText = ''; isMirrorMode = false; viewerScreenWidth = 0;
      window.history.replaceState({}, '', location.pathname);
      location.reload();
    }, 200); // small delay to let message send
  }

  document.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey && document.activeElement?.id==='msgInput') {
      e.preventDefault(); sendMsg();
    }
  });
</script>
</body>
</html>
